const liveCache={};
const BASE='https://opendata.cbs.nl/ODataApi/OData/37325/TypedDataSet';
async function fetchLive(year){
  if(liveCache[year]) return liveCache[year];
  const p=`${year}JJ00`,gF="(Geslacht eq '3000   ' or Geslacht eq '4000   ')",aF=`(Migratieachtergrond eq '${A_NL}' or Migratieachtergrond eq '${A_WEST}' or Migratieachtergrond eq '${A_NWEST}')`;
  const allC=LEEFTIJDEN.flatMap(l=>l.composite||[l.code]),lF=allC.map(c=>`Leeftijd eq '${c}'`).join(' or ');
  const filter=`${gF} and ${aF} and (${lF}) and Perioden eq '${p}' and Generatie eq 'T001040' and BurgerlijkeStaat eq 'T001019'`;
  const resp=await fetch(`${BASE}?$filter=${encodeURIComponent(filter)}&$select=Geslacht,Leeftijd,Migratieachtergrond,Bevolking_1&$top=2000`);
  if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const json=await resp.json(),lk={};
  for(const r of json.value) lk[`${r.Geslacht.trim()}|${r.Leeftijd.trim()}|${r.Migratieachtergrond.trim()}`]=r.Bevolking_1||0;
  liveCache[year]=lk; return lk;
}
function processLookup(lk){
  return LEEFTIJDEN.map(l=>{
    const codes=l.composite||[l.code],v=(g,a)=>codes.reduce((s,c)=>s+(lk[`${g}|${c}|${a}`]||0),0);
    return {age:l.label,mNL:v(G_MAN,A_NL),mW:v(G_MAN,A_WEST),mNW:v(G_MAN,A_NWEST),fNL:v(G_VROUW,A_NL),fW:v(G_VROUW,A_WEST),fNW:v(G_VROUW,A_NWEST)};
  });
}

async function load(year){

    let lk,source;
    if(liveMode){
      try{lk=await fetchLive(year);source='live';}
      catch(e){
        lk=cache[year];source='fallback';
        if(!lk) throw new Error(`Jaar ${year} niet beschikbaar via CBS of pre-downloaded data.`);
      }
    } else {lk=cache[year];source='static';if(!lk) throw new Error(`Jaar ${year} niet in pre-downloaded data.`);}
    draw(processLookup(lk),year);
    st.className='ok';
    st.textContent=source==='live'?`✔ Live CBS-data (${year})`
      :source==='fallback'?`⚠️ Pre-downloaded data (${year}) — CBS niet bereikbaar`
      :`✔ Pre-downloaded data · ${year}`;
  }catch(err){st.className='error';st.textContent=`Fout: ${err.message}`;}
}
document.querySelectorAll('.legend-item[data-cat]').forEach(item=>{
  item.addEventListener('click',()=>{
    const cat=item.dataset.cat;
    enabled.has(cat)?(enabled.delete(cat),item.classList.add('disabled')):(enabled.add(cat),item.classList.remove('disabled'));
    redraw();
  });
});
document.getElementById('chk-mv').addEventListener('change',e=>{splitMV=e.target.checked;updateLegend();redraw();});
document.getElementById('chk-overlay').addEventListener('change',e=>{overlayMode=e.target.checked;updateLegend();redraw();});
document.querySelectorAll('.ctrl-btn[data-year]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    stopPlay();
    document.querySelectorAll('.ctrl-btn[data-year]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');load(parseInt(btn.dataset.year));
  });
});
let intervalMs=300;
document.getElementById('speed-slider').addEventListener('input',e=>{
  const s=parseFloat(e.target.value);intervalMs=Math.round(s*1000);
  document.getElementById('speed-label').textContent=s.toFixed(1)+'s';
  if(playing){stopPlay();startPlay();}
});
const ALL_YEARS=[2000,2001,2002,2003,2004,2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022];
let playing=false,playTimer=null,playIndex=0;
function setYearActive(y){const s=document.getElementById('year-slider');if(s){s.value=y;document.getElementById('year-display').textContent=y;}}
function startPlay(){
  playing=true;document.getElementById('play-btn').textContent='⏸ Stoppen';
  const cur=parseInt(document.getElementById('year-slider').value);
  playIndex=ALL_YEARS.indexOf(cur);
  if(playIndex<0||playIndex>=ALL_YEARS.length-1)playIndex=0;else playIndex=(playIndex+1)%ALL_YEARS.length;
  function step(){setYearActive(ALL_YEARS[playIndex]);load(ALL_YEARS[playIndex]);playIndex++;if(playIndex>=ALL_YEARS.length)stopPlay();else playTimer=setTimeout(step,intervalMs);}
  playTimer=setTimeout(step,0);
}
function stopPlay(){playing=false;clearTimeout(playTimer);document.getElementById('play-btn').textContent='▶ Afspelen';}
document.getElementById('play-btn').addEventListener('click',()=>{if(playing)stopPlay();else startPlay();});
function toggleFullscreen(){
  const el=document.documentElement;
  const isFs=document.fullscreenElement||document.webkitFullscreenElement;
  if(!isFs){
    if(el.requestFullscreen) el.requestFullscreen().catch(()=>{});
    else if(el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else{ alert('Volledig scherm wordt niet ondersteund op dit apparaat. Gebruik de knop onderaan Safari om toe te voegen aan het startscherm voor de beste ervaring.'); return; }
  } else {
    if(document.exitFullscreen) document.exitFullscreen().catch(()=>{});
    else if(document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
}
document.getElementById('fs-btn').addEventListener('click', toggleFullscreen);
['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
  const isFs=document.fullscreenElement||document.webkitFullscreenElement;
  document.getElementById('fs-btn').textContent=isFs?'✕':'\u26F6';
}));

// Herteken bij resize (portrait/landscape wissel)
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>redraw(),150);
});

document.getElementById('cbs-btn').addEventListener('click',()=>{
  liveMode=!liveMode;
  const btn=document.getElementById('cbs-btn');
  if(liveMode){btn.textContent='✔ Live CBS actief';btn.style.color='#1D9E75';btn.style.borderColor='#1D9E75';}
  else{btn.textContent='?? Verbind met CBS';btn.style.color='';btn.style.borderColor='';}
  redraw();
});
updateLegend();
load(2022);
</script>
</body>
</html>
